name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_name:
        description: 'Version name (e.g. 1.0.0). Defaults to pubspec value.'
        required: false
      build_number:
        description: 'Build number (versionCode). Defaults to pubspec value.'
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.35.5'
          cache: true

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > "${{ runner.temp }}/upload-keystore.jks"

      - name: Install dependencies
        run: flutter pub get

      - name: Build APKs (split per ABI)
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/upload-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          EXTRA=""
          if [ -n "${{ github.event.inputs.build_name }}" ]; then
            EXTRA="$EXTRA --build-name=${{ github.event.inputs.build_name }}"
          fi
          if [ -n "${{ github.event.inputs.build_number }}" ]; then
            EXTRA="$EXTRA --build-number=${{ github.event.inputs.build_number }}"
          fi
          flutter build apk --release --split-per-abi $EXTRA
          flutter build apk --release $EXTRA

      - name: Build App Bundle (Play Store)
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/upload-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          EXTRA=""
          if [ -n "${{ github.event.inputs.build_name }}" ]; then
            EXTRA="$EXTRA --build-name=${{ github.event.inputs.build_name }}"
          fi
          if [ -n "${{ github.event.inputs.build_number }}" ]; then
            EXTRA="$EXTRA --build-number=${{ github.event.inputs.build_number }}"
          fi
          flutter build appbundle --release $EXTRA

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab
